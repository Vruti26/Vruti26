name: Generate Snake Contribution SVG

on:
  schedule: 
    - cron: "0 */12 * * *"    
  workflow_dispatch:
  push: 
    branches: ["master", "main"] 

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate github contribution snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Vruti26
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23C99FBC
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23C99FBC
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
