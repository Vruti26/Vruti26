name: Generate Snake Contribution SVG

on:
  # Schedule updates (At minute 0 past every 12th hour)
  schedule: 
    - cron: "0 */12 * * *"    
  # Lines below let you run workflow manually with each commit
  workflow_dispatch:
  # run on every push on the master/main branch
  push: 
    branches: ["master", "main"] 

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
      - name: generate github contribution snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ Vruti26 }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23C99FBC
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23C99FBC
        env:
             GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # push the content of <build_dir> to a branch
      # the content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/<target_branch>/<file>
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output       # Please don't make changes to the main branch, because doing so will erase all previous changes.
          build_dir: dist
       env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
